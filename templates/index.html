<!DOCTYPE html>
<html>
<head>
    <title>Lavandería ESMA</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="{{ url_for('static', filename='ESMA.png') }}" class="ESMA">
        <h1>Lavandería ESMA</h1>
        <h3>Escuela Superior Militar de Aviación</h3>
    </div>

    <!-- FORM -->
    <div class="form-box">
        <form method="POST">
            <input type="text" name="cliente" placeholder="Cliente" required>
            <input type="email" name="correo" placeholder="Correo" required>
            <input type="number" step="0.01" name="peso" placeholder="Peso (kg)" required>

            <input type="number" name="azul" placeholder="Azul Costa" value="0">
            <input type="number" name="calzado" placeholder="Calzado" value="0">
            <input type="number" name="otros" placeholder="Otros Uniformes" value="0">

            <input type="date" name="fecha" required>

            <button type="submit">Registrar</button>
        </form>
    </div>

    <!-- BUSCADOR -->
    <div class="form-box">
        <form method="GET">
            <input type="text" name="buscar" placeholder="Buscar cliente">
            <button type="submit">Buscar</button>
        </form>
    </div>

    <!-- TABLA -->
    <div class="table-box">
        <h2>Clientes</h2>

        <table>
            <tr>
                <th>Cliente</th>
                <th>Peso</th>
                <th>Azul</th>
                <th>Calzado</th>
                <th>Otros</th>
                <th>Total</th>
                <th>Fecha</th>
                <th>Acción</th>
            </tr>

            {% for d in datos %}
            <tr>
                <td>{{ d[1] }}</td>
                <td>{{ d[3] }}</td>
                <td>{{ d[4] }}</td>
                <td>{{ d[5] }}</td>
                <td>{{ d[6] }}</td>
                <td>${{ "%.2f"|format(d[7]) }}</td>
                <td>{{ d[8] }}</td>
                <td><a href="/pagar/{{ d[0] }}" class="btn-pagar">💵</a></td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <!-- GRAFICO -->
    <div class="table-box">
        <h2>Ingresos Mensuales</h2>
        <canvas id="grafico"></canvas>
    </div>

</div>

<script>
const clienteInput = document.querySelector("input[name='cliente']");
const correoInput = document.querySelector("input[name='correo']");

clienteInput.addEventListener("blur", function() {
    let nombre = clienteInput.value;

    fetch(`/get_cliente/${nombre}`)
    .then(res => res.json())
    .then(data => {
        if (data.correo) {
            correoInput.value = data.correo;
        }
    });
});

// GRAFICO
new Chart(document.getElementById('grafico'), {
    type: 'bar',
    data: {
        labels: {{ meses | safe }},
        datasets: [{
            label: 'Ingresos',
            data: {{ totales | safe }}
        }]
    }
});
</script>

</body>
</html>
